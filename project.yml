name: AAPSClientiOS
options:
  bundleIdPrefix: com.nightaps
  deploymentTarget:
    iOS: "16.0"
  generateEmptyDirectories: true
configFiles:
  Debug: Config/Local.xcconfig
  Release: Config/Local.xcconfig
settings:
  SWIFT_VERSION: "5.9"
  CODE_SIGN_STYLE: Automatic
targets:
  AAPSClientiOS:
    type: application
    platform: iOS
    sources:
      - path: App
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.nightaps.aapsclientios
      GENERATE_INFOPLIST_FILE: YES
      SUPPORTED_PLATFORMS: iphoneos iphonesimulator
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "3"
      CODE_SIGN_STYLE: Automatic
    info:
      path: App/Info.plist
      properties:
        BGTaskSchedulerPermittedIdentifiers: ["com.nightaps.aapsclientios.refresh"]
        UIBackgroundModes: ["fetch", "audio"]
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        UIRequiresFullScreen: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    dependencies: []
  AAPSClientiOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AppTests
    settings:
      GENERATE_INFOPLIST_FILE: YES
      PRODUCT_BUNDLE_IDENTIFIER: com.nightaps.aapsclientios.tests
    dependencies:
      - target: AAPSClientiOS
